name: Generate static map

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: URL to capture
        required: false
        default: "http://89.167.106.119:3001/map"
  schedule:
    - cron: "0 0 * * 0"

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: karol-brejna-i/webpage-screenshot-action@v1
        with:
          url: ${{ inputs.website_url || 'http://89.167.106.119:3001/map' }}
          output: map-static.png
