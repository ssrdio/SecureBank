name: Generate static map

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: URL to capture
        required: false
        default: "http://89.167.106.119:3001/map"
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure images directory exists
        run: mkdir -p images

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Install Playwright
        run: |
          npm install -D playwright
          npx playwright install --with-deps chromium
      
      - name: Take screenshot
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');
      
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage({
              viewport: { width: 1920, height: 1080 }
            });
      
            await page.goto(
              process.env.URL,
              { waitUntil: 'networkidle' }
            );
      
            // Optional: wait for your map to finish rendering
            // await page.waitForSelector('#map-ready');
      
            await page.screenshot({
              path: 'images/static-map.png'
            });
      
            await browser.close();
          })();
          EOF
        env:
          URL: ${{ github.event_name == 'workflow_dispatch' && inputs.website_url || 'http://89.167.106.119:3001/map' }}

      - name: Commit updated map
        run: |
          git config user.name "DominikBrezovsek"
          git config user.email "dominik.brezovsek@student.um.si"

          git add images/static-map.png

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update static map"
          git push
